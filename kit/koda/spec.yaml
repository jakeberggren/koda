schemaVersion: "1"
kind: agent
name: koda
displayName: Koda
description: Swedish for 'to code'.

agent:
  image: "docker/sandbox-templates:shell"
  persistence: persistent
  entrypoint:
    run: [koda]

credentials:
  sources:
    anthropic:
      env:
        - ANTHROPIC_API_KEY
    bergetai:
      env:
        - BERGETAI_API_KEY
    openai:
      env:
        - OPENAI_API_KEY
    github:
      env:
        - GH_TOKEN

environment:
  variables:
    KODA_CREDENTIAL_MODE: proxy-managed
  proxyManaged:
    - ANTHROPIC_API_KEY
    - BERGETAI_API_KEY
    - OPENAI_API_KEY
    - GH_TOKEN

network:
  serviceDomains:
    api.anthropic.com: anthropic
    api.berget.ai: bergetai
    api.openai.com: openai
    api.github.com: github
  serviceAuth:
    anthropic:
      headerName: x-api-key
      valueFormat: "%s"
    bergetai:
      headerName: Authorization
      valueFormat: "Bearer %s"
    openai:
      headerName: Authorization
      valueFormat: "Bearer %s"
    github:
      headerName: Authorization
      valueFormat: "Bearer %s"

commands:
  install:
    - command: "curl -fsSL
        https://raw.githubusercontent.com/jakeberggren/koda/main/install.sh |
        bash"
      user: "1000"
      description: Install Koda.
