default_language_version:
  python: python3.13

default_install_hook_types:
  - pre-commit
  - pre-push

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=auto]

      - id: check-ast
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: pretty-format-json
        args: [--autofix]

      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-case-conflict

      - id: name-tests-test
        args: [--pytest-test-first]

      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable

      - id: detect-private-key

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.9.13
    hooks:
      - id: uv-lock

  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types: [python]

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types: [python]

      - id: ty # type checking
        name: ty check
        entry: uv run ty check
        language: system
        types: [python]

      - id: pytest-koda # unit tests for koda (pre-push)
        name: pytest koda
        entry: uv run pytest packages/koda
        language: system
        files: ^packages/koda/
        stages: [pre-push]
        pass_filenames: false

      - id: pytest-koda-tui # unit tests for koda-tui (pre-push)
        name: pytest koda-tui
        entry: uv run pytest packages/koda-tui
        language: system
        files: ^packages/koda-tui/
        stages: [pre-push]
        pass_filenames: false

      - id: pytest-koda-common # unit tests for koda-common (pre-push)
        name: pytest koda-common
        entry: uv run pytest packages/koda-common
        language: system
        files: ^packages/koda-common/
        stages: [pre-push]
        pass_filenames: false

      - id: pytest-koda-service # unit tests for koda-service (pre-push)
        name: pytest koda-service
        entry: uv run pytest packages/koda-service
        language: system
        files: ^packages/koda-service/
        stages: [pre-push]
        pass_filenames: false

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.3.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [--verbose] # optional: list of Conventional Commits types to allow e.g. [feat, fix, ci, chore, test]

  # Security scanning
  - repo: https://github.com/semgrep/pre-commit
    rev: v1.144.0
    hooks:
      - id: semgrep
        args: [--config=auto]
        stages: [pre-push]

  # Secrets detection
  - repo: https://github.com/trufflesecurity/trufflehog
    rev: v3.91.1
    hooks:
      - id: trufflehog
        stages: [pre-push]
