name: ShellCheck

on:
  push:
    branches:
      - main
    paths:
      - '**/*.sh'
      - 'scripts/**'
      - '.github/workflows/shellcheck.yml'
  pull_request:
    branches:
      - main
    paths:
      - '**/*.sh'
      - 'scripts/**'
      - '.github/workflows/shellcheck.yml'

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: git ls-files '*.sh' 'scripts/*' | xargs -r shellcheck
