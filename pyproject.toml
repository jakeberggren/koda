[build-system]
requires = ["uv_build>=0.9.13,<0.10.0"]
build-backend = "uv_build"

[project]
name = "agents"
version = "0.1.0"
description = "Provider agnostic Agent frameworka"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "openai>=2.8.1",
    "pydantic>=2.12.5",
    "pydantic-settings>=2.12.0",
    "typer>=0.20.0",
]

[project.scripts]
agents = "agents.cli.main:main"

[dependency-groups]
dev = [
    "pre-commit>=4.5.0",
    "pytest>=9.0.1",
    "ruff>=0.14.7",
    "ty>=0.0.1a29",
]

[tool.ruff]
line-length = 100
indent-width = 4
target-version = "py313"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "S",   # flake8-bandit (security rules)
    "D",   # pydocstyle (docstring checks)
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.ruff.lint.isort]
known-first-party = ["agents"]

[tool.ruff.lint.pydocstyle]
convention = "google"
ignore-var-parameters = true
ignore-decorators = ["typing.overload"]

[tool.ruff.lint.mccabe]
max-complexity = 5
