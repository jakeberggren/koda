[dependency-groups]
dev = [
    "pre-commit~=4.5.0",
    "pyinstaller~=6.19.0",
    "pytest~=9.0.1",
    "pytest-asyncio>=1.3.0",
    "pytest-cov~=7.1.0",
    "ruff~=0.15.0",
    "ty~=0.0.1a29",
]

[tool.uv.workspace]
members = ["packages/*"]

[tool.ruff]
line-length = 100
indent-width = 4
target-version = "py313"

[tool.ruff.lint]
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # pyflakes
    "I",     # isort
    "N",     # pep8-naming
    "Q",     # flake8-quotes
    "B",     # flake8-bugbear
    "S",     # flake8-bandit (security rules)
    "C4",    # flake8-comprehensions
    "FA",    # flake8-future-annotations
    "UP",    # pyupgrade
    "PL",    # pylint
    "PT",    # flake8-pytest-style
    "TC",    # flake8-type-checking
    "PIE",   # flake8-pie (best practices)
    "SIM",   # flake8-simplify
    "RSE",   # flake8-raise
    "RET",   # flake8-return
    "SLF",   # flake8-self
    "TID",   # flake8-tidy-imports
    "ARG",   # flake8-unused-arguments
    "PTH",   # flake8-use-pathlib
    "FBT",   # flake8-boolean-trap
    "RUF",   # ruff-specific rules
    "COM",   # flake8-commas
    "TRY",   # tryceratops
    "C90",   # mccabe complexity
    "PERF",  # perflint performance rules
    "ASYNC", # flake8-async
]
ignore = ["COM812"]

[tool.ruff.lint.per-file-ignores]
"*/tests/**/*.py" = [
    "S101",    # Allow assert in tests
    "ARG002",  # Unused arguments in mocks/fixtures matching interfaces
    "S108",    # Temp paths in tests
    "PLR2004", # Magic values are often clearer in test assertions
    "TRY003",  # Long exception messages
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.ruff.lint.isort]
known-first-party = ["koda", "koda_common", "koda_service", "koda_tui"]

[tool.ruff.lint.mccabe]
max-complexity = 5

[tool.uv]
required-environments = [
    "sys_platform == 'darwin' and platform_machine == 'arm64'",
    "sys_platform == 'linux' and platform_machine == 'x86_64'",
    "sys_platform == 'linux' and platform_machine == 'aarch64'",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = [
    "packages/koda/tests",
    "packages/koda-common/tests",
    "packages/koda-service/tests",
    "packages/koda-tui/tests",
]
markers = [
    "requires_rg: tests that require ripgrep (rg) to be installed",
]
addopts = "--import-mode=importlib --cov=koda --cov=koda_common --cov=koda_service --cov=koda_tui --cov-report=term"
