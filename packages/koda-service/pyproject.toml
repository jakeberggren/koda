[project]
name = "koda-service"
version = "0.6.2"
description = "Service boundary and runtime orchestration for the Koda core."
readme = "README.md"

requires-python = ">=3.13"
dependencies = [
    "koda",
    "koda-common",
]

[tool.uv.sources]
koda = { workspace = true }
koda-common = { workspace = true }

[build-system]
requires = ["uv_build>=0.11.16,<0.12.0"]
build-backend = "uv_build"
