[project]
name = "koda-api"
version = "0.1.0"
description = "Client/server API layer for Koda, supporting in-process and remote backends."
readme = "README.md"

requires-python = ">=3.13"
dependencies = [
    "koda",
    "koda-common",
    "fastapi~=0.128.7",
]

[tool.uv.sources]
koda = { workspace = true }
koda-common = { workspace = true }

[build-system]
requires = ["uv_build>=0.9.10,<0.10.0"]
build-backend = "uv_build"
