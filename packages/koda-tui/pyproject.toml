[project]
name = "koda-tui"
version = "0.4.1"
description = "KODA Terminal UI"
readme = "README.md"

requires-python = ">=3.13"
dependencies = [
    "koda-common",
    "koda-service",
    "pathspec>=1.1.1,<2",
    "prompt-toolkit>=3.0.52,<4",
    "rich>=15.0.0,<16",
    "wcwidth>=0.6.0,<1",
]

[tool.uv.sources]
koda-common = { workspace = true }
koda-service = { workspace = true }

[project.scripts]
koda = "koda_tui:main"

[build-system]
requires = ["uv_build>=0.11.16,<0.12.0"]
build-backend = "uv_build"
