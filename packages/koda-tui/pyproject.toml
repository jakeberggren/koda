[project]
name = "koda-tui"
version = "0.1.2"
description = "KODA Terminal UI"
readme = "README.md"

requires-python = ">=3.13"
dependencies = [
    "koda-common",
    "koda-service",
    "pathspec~=1.0.4",
    "prompt-toolkit~=3.0.52",
    "rich~=14.2.0",
    "wcwidth~=0.6.0",
]

[tool.uv.sources]
koda-common = { workspace = true }
koda-service = { workspace = true }

[project.scripts]
koda = "koda_tui:main"

[build-system]
requires = ["uv_build>=0.9.10,<0.10.0"]
build-backend = "uv_build"
