[project]
name = "koda-tui"
version = "0.1.0"
description = "Terminal UI for the Koda agent"
readme = "README.md"

requires-python = ">=3.13"
dependencies = [
    "koda"
]

[tool.uv.sources]
koda = { workspace = true }

[project.scripts]
koda-tui = "koda_tui:main"

[build-system]
requires = ["uv_build>=0.9.10,<0.10.0"]
build-backend = "uv_build"
