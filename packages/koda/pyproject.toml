[project]
name = "koda"
version = "0.6.0"
description = "KODA core library and agent framework."
readme = "README.md"

requires-python = ">=3.13"

dependencies = [
    "anthropic>=0.100.0,<1",
    "anyio>=4.12.0,<5",
    "authlib>=1.7.2",
    "httpx>=0.28.1",
    "koda-common",
    "langfuse>=4.5.1,<5",
    "openai>=2.29.0,<3",
    "pathspec>=1.1.1,<2",
    "pydantic>=2.13.3,<3",
    "pydantic-settings>=2.14.0,<3",
]

[project.entry-points.pyinstaller40]
hook-dirs = "koda.__pyinstaller:get_hook_dirs"

[build-system]
requires = ["uv_build>=0.11.16,<0.12.0"]
build-backend = "uv_build"

[tool.uv.sources]
koda-common = { workspace = true }
