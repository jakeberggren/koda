[project]
name = "koda"
version = "0.1.5"
description = "KODA core library and agent framework."
readme = "README.md"

requires-python = ">=3.13"

dependencies = [
    "anyio~=4.12.0",
    "koda-common",
    "langfuse~=4.0.0",
    "openai~=2.29.0",
    "pathspec~=1.0.4",
    "pydantic~=2.12.5",
    "pydantic-settings~=2.12.0",
]

[build-system]
requires = ["uv_build>=0.9.13,<0.10.0"]
build-backend = "uv_build"

[tool.uv.sources]
koda-common = { workspace = true }
