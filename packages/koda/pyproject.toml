[project]
name = "koda"
version = "0.1.0"
description = "Core library and agent framework for KODA."
readme = "README.md"

requires-python = ">=3.13"

dependencies = [
    "openai~=2.14.0",
    "pydantic~=2.12.5",
    "pydantic-settings~=2.12.0",
    "typer~=0.21.0",
]

[project.scripts]
koda = "koda.cli.main:main"

[build-system]
requires = ["uv_build>=0.9.13,<0.10.0"]
build-backend = "uv_build"
