[project]
name = "koda-common"
version = "0.3.2"
description = "KODA Common utilities"
readme = "README.md"

requires-python = ">=3.13"
dependencies = [
    "pydantic>=2.13.3,<3",
    "pydantic-settings>=2.14.0,<3",
    "structlog>=25.5.0,<26",
]

[build-system]
requires = ["uv_build>=0.9.10,<0.10.0"]
build-backend = "uv_build"
