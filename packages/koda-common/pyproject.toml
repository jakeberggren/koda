[project]
name = "koda-common"
version = "0.1.0"
description = "Common utilities for Koda"
readme = "README.md"

requires-python = ">=3.13"
dependencies = [
    "pydantic~=2.12.5",
    "pydantic-settings~=2.12.0",
]

[project.optional-dependencies]
keychain = ["keyring~=25.7.0"]

[project.scripts]
koda-common = "koda_common:main"


[build-system]
requires = ["uv_build>=0.9.10,<0.10.0"]
build-backend = "uv_build"
