[project]
name = "koda-common"
version = "0.4.1"
description = "KODA Common utilities"
readme = "README.md"

requires-python = ">=3.13"
dependencies = [
    "pydantic>=2.13.3,<3",
    "pydantic-settings>=2.14.0,<3",
    "structlog>=26.1,<27",
]

[build-system]
requires = ["uv_build>=0.11.16,<0.12.0"]
build-backend = "uv_build"
